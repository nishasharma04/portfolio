<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nisha | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8b5cf6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding: 40px; }
        
        .container { max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: var(--card); padding: 20px; border-radius: 15px; border-left: 5px solid var(--primary); }
        
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 15px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: var(--primary); color: white; }
        
        .delete-btn { background: #ff4757; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
        .delete-btn:hover { background: #ff6b81; }

        /* Login Overlay */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .login-box { background: var(--card); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid var(--primary); }
        input { padding: 10px; border-radius: 5px; border: none; width: 100%; margin: 15px 0; }
    </style>
</head>
<body>

    <!-- Simple Login Protection -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Admin Login</h2>
            <input type="password" id="pass" placeholder="Enter Admin Password">
            <button onclick="login()" style="width: 100%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer;">Enter Dashboard</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>Dashboard Control</h1>
            <button onclick="location.reload()" style="background:none; border: 1px solid #fff; color: white; padding: 5px 15px; cursor: pointer; border-radius: 5px;">Refresh Data</button>
        </div>

        <div class="stats">
            <div class="stat-box">
                <h3 id="count">0</h3>
                <p>New Messages</p>
            </div>
            <div class="stat-box">
                <h3>Live</h3>
                <p>System Status</p>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Message</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="msg-list"></tbody>
        </table>
    </div>

    <script>
        function login() {
            const p = document.getElementById('pass').value;
            if(p === "nisha123") { // Password setup
                document.getElementById('login-screen').style.display = 'none';
                loadData();
            } else {
                alert("Wrong password!");
            }
        }

        function loadData() {
            const msgs = JSON.parse(localStorage.getItem('msgs')) || [];
            document.getElementById('count').innerText = msgs.length;
            const list = document.getElementById('msg-list');
            
            list.innerHTML = msgs.map((m, i) => `
                <tr>
                    <td style="font-size: 0.8rem; color: #94a3b8;">${m.date || 'N/A'}</td>
                    <td><b>${m.name}</b></td>
                    <td>${m.email}</td>
                    <td>${m.msg}</td>
                    <td><button class="delete-btn" onclick="deleteMsg(${i})">Delete</button></td>
                </tr>
            `).reverse().join('');
        }

        function deleteMsg(index) {
         let msgs = JSON.parse(localStorage.getItem('msgs')) || [];
            // Reverse handle logic: index is from reversed array
            msgs.splice(msgs.length - 1 - index, 1); 
            localStorage.setItem('msgs', JSON.stringify(msgs));
            loadData();
        }
    </script>
</body>
</html>
