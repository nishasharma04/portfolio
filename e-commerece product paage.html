<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Page</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  padding: 30px;
}

.container {
  display: flex;
  gap: 40px;
  max-width: 1000px;
  flex-wrap: wrap;
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
}

/* IMAGE SECTION */
.images {
  flex: 1;
}

.main-img {
  width: 100%;
  height: 350px;
  object-fit: cover;
  border-radius: 10px;
  transition: 0.3s;
}

.thumbnails {
  display: flex;
  margin-top: 10px;
}

.thumbnails img {
  width: 70px;
  height: 70px;
  object-fit: cover;
  margin-right: 10px;
  cursor: pointer;
  border-radius: 5px;
  border: 2px solid transparent;
  transition: 0.3s;
}

.thumbnails img:hover,
.thumbnails img.active {
  border: 2px solid #22c55e;
  transform: scale(1.05);
}

/* DETAILS */
.details {
  flex: 1;
}

.badge {
  background: crimson;
  padding: 5px 10px;
  border-radius: 5px;
  display: inline-block;
  margin-bottom: 10px;
}

.price {
  color: #22c55e;
  font-size: 24px;
  margin: 10px 0;
}

.rating {
  color: gold;
  margin: 10px 0;
}

/* QUANTITY */
.quantity {
  display: flex;
  align-items: center;
  margin: 20px 0;
}

.quantity button {
  padding: 8px 15px;
  font-size: 18px;
  cursor: pointer;
  background: #334155;
  border: none;
  color: white;
}

.quantity span {
  margin: 0 15px;
  font-size: 18px;
}

/* TOTAL */
.total {
  font-size: 18px;
  margin-bottom: 15px;
}

/* BUTTON */
button.add {
  padding: 12px 25px;
  background: #22c55e;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 8px;
  font-size: 16px;
  transition: 0.3s;
}

button.add:hover {
  background: #16a34a;
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">

  <!-- IMAGE SECTION -->
  <div class="images">
    <img id="mainImage" src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" class="main-img">

    <div class="thumbnails">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" class="active" onclick="changeImage(this)">
      <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519" onclick="changeImage(this)">
      <img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a" onclick="changeImage(this)">
    </div>
  </div>

  <!-- DETAILS -->
  <div class="details">
    <span class="badge">Best Seller</span>
    <h2>Cool Sneakers</h2>
    <p class="price">₹999</p>

    <div class="rating">★★★★★</div>

    <p>Premium comfortable sneakers designed for style and daily wear.</p>

    <!-- QUANTITY -->
    <div class="quantity">
      <button onclick="decrease()">-</button>
      <span id="qty">1</span>
      <button onclick="increase()">+</button>
    </div>

    <p class="total">Total: ₹<span id="total">999</span></p>

    <button class="add" onclick="addToCart()">Add to Cart</button>
  </div>

</div>

<script>
let quantity = 1;
const price = 999;

// Change image
function changeImage(img) {
  document.getElementById("mainImage").src = img.src;

  document.querySelectorAll(".thumbnails img").forEach(i => i.classList.remove("active"));
  img.classList.add("active");
}

// Increase quantity
function increase() {
  quantity++;
  updateTotal();
}

// Decrease quantity
function decrease() {
  if (quantity > 1) {
    quantity--;
    updateTotal();
  }
}

// Update total
function updateTotal() {
  document.getElementById("qty").innerText = quantity;
  document.getElementById("total").innerText = quantity * price;
}

// Add to cart (multiple items support)
function addToCart() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  const product = {
    name: "Cool Sneakers",
    price: price,
    quantity: quantity,
    image: document.getElementById("mainImage").src
  };

  cart.push(product);

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("✅ Product added to cart!");
}
</script>

</body>
</html>
